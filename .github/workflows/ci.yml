name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref. Saves Actions minutes and stops
# flaky concurrent deploys from racing.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: lint · typecheck · build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      # Public env vars get inlined at build time by Next. They aren't secret
      # (RLS is the security boundary) but the build still expects them.
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ci.example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
        run: npx next build

      # Verify the OpenNext Workers build also succeeds — the deploy path.
      - name: OpenNext (Cloudflare) build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ci.example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
        run: npx opennextjs-cloudflare build

  # RLS regression guard. Stands up a bare Postgres + pgTAP, applies the
  # canonical schema.sql (the source of truth for a fresh install) on top of
  # tests/setup.sql's Supabase scaffolding, then runs the pgTAP suite. A PR that
  # weakens a policy fails here before a human reviews it.
  db:
    name: RLS · pgTAP
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Postgres 16 + pgTAP
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            postgresql postgresql-contrib postgresql-16-pgtap \
            libtap-parser-sourcehandler-pgtap-perl
          sudo pg_ctlcluster 16 main start

      - name: Apply schema + run RLS tests
        run: |
          sudo -u postgres psql -q -c "create database tacktest;"
          sudo -u postgres psql -v ON_ERROR_STOP=1 -q -d tacktest -f supabase/tests/setup.sql
          sudo -u postgres psql -v ON_ERROR_STOP=1 -q -d tacktest -f supabase/schema.sql
          sudo -u postgres pg_prove -d tacktest supabase/tests/database/rls.test.sql
